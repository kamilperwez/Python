<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Iffat 🤍 Kamil</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@300;500;700&display=swap');

        :root {
            --rose-gold: #f4dada;
            --deep-pink: #ff8fa3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            height: 100vh;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            color: #fff;
        }

        /* --- ROMANTIC TOP BAR --- */
        .top-bar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            z-index: 20;
            font-family: 'Dancing Script', cursive;
            font-size: 1.6rem;
            color: var(--rose-gold);
            text-shadow: 0 0 15px rgba(255, 143, 163, 0.9);
            letter-spacing: 2px;
        }

        /* --- SPARKLING STARFIELD --- */
        #star-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -3;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* --- COMPLETELY VISIBLE BACKGROUND GIF --- */
        #bg-gif {
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            object-fit: contain; 
            z-index: -2;
            filter: brightness(1); /* Maximum brightness */
            transition: opacity 1s ease; opacity: 0;
        }

        /* --- ULTRA-TRANSPARENT CARD --- */
        .card {
            background: transparent; /* Removed all background color */
            backdrop-filter: blur(4px); /* Very light blur for readability only */
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.15); /* Thin elegant border */
            border-radius: 40px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
            z-index: 10;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .tabs { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            margin-bottom: 20px; 
        }
        
        .tab-btn {
            padding: 12px; cursor: pointer; border-radius: 20px;
            font-size: 0.85rem; font-weight: 700; color: #fff;
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }
        .tab-btn.active { 
            background: var(--deep-pink); 
            border-color: var(--deep-pink);
            box-shadow: 0 0 20px rgba(255, 143, 163, 0.6);
        }

        .emoji-box { font-size: 60px; margin-bottom: 10px; filter: drop-shadow(0 0 15px var(--rose-gold)); }

        h1 { font-family: 'Dancing Script', cursive; color: var(--rose-gold); font-size: 2.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        
        #message-box { 
            min-height: 100px; 
            font-size: 1.1rem; 
            line-height: 1.5; 
            font-style: italic; 
            margin: 15px 0;
            color: #fff;
            text-shadow: 2px 2px 8px rgba(0,0,0,1); /* Shadow ensures text is seen over any GIF */
        }
        
        .kamil-sig { font-family: 'Dancing Script', cursive; color: var(--rose-gold); font-size: 1.8rem; display: block; margin-bottom: 20px; text-shadow: 1px 1px 3px #000; }

        .btn-stack { display: flex; flex-direction: column; gap: 12px; }
        
        .btn-reveal {
            background: linear-gradient(45deg, #ff8fa3, #e5b1b1);
            border: none; color: #000; padding: 16px; border-radius: 50px;
            font-weight: 800; cursor: pointer; text-transform: uppercase; width: 100%;
            font-size: 1rem;
            box-shadow: 0 5px 20px rgba(255, 143, 163, 0.5);
        }

        .btn-wa {
            background: #25D366; color: #fff; border: none; padding: 14px; border-radius: 50px;
            font-weight: 700; text-decoration: none; display: flex; align-items: center; justify-content: center;
            gap: 10px; font-size: 1rem;
        }

        .petal {
            position: fixed; top: -10%; user-select: none; pointer-events: none; z-index: 5;
            animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="top-bar">IFFAT: THE LIGHT OF MY LIFE 💖</div>

    <div id="star-layer"></div>
    <img id="bg-gif" src="">

    <div class="card">
        <div class="tabs">
            <button class="tab-btn active" onclick="setTab('cat', '🐱', this, true)">Cats 🐾</button>
            <button class="tab-btn" onclick="setTab('dudu bubu peach goma', '🍑', this, false)">Bears</button>
            <button class="tab-btn" onclick="setTab('cute penguin love', '🐧', this, false)">Pengu</button>
            <button class="tab-btn" onclick="setTab('cute monkey love', '🐒', this, false)">Monkeys</button>
        </div>

        <div class="emoji-box" id="display-emoji">🐱</div>
        <h1>For My Iffat</h1>
        
        <div id="message-box">"Tap for a surprise from Kamil..."</div>

        <span class="kamil-sig">Always Yours, Kamil 🤍</span>

        <div class="btn-stack">
            <button class="btn-reveal" onclick="reveal()">GENERATE NOTE & VOICE 💖</button>
            <a href="https://wa.me/918010589583?text=I%20LOVE%20YOU%20KAMIL" target="_blank" class="btn-wa">
                WHATSAPP KAMIL 📲
            </a>
        </div>
    </div>

    <script>
        let currentQuery = 'cat';
        let useCatAPI = true;

        const loveNotes = [
            "Iffat, you are the most beautiful person I know, inside and out.",
            "My heart beats only for you, my dearest Iffat.",
            "You are my Bubu and I am your Dudu forever. 🤍",
            "I'm bananas for you, Iffat! No monkeying around. 🍌",
            "Every day with you is a new adventure in love. - Kamil",
            "You are my celestial sunshine, Iffat. You brighten my darkest days.",
            "My love for you grows stronger with every single breath I take.",
            "You're not just my girl; you're my best friend and my soulmate.",
            "Iffat, you make my life complete. Thank you for being mine.",
            "Thinking of you keeps me awake. Dreaming of you keeps me asleep.",
            "You're the melody to my heart's song, and I never want to stop listening.",
            "I want to grow old with you, Iffat. Just you and me against the world.",
            "You're the best thing that ever happened to me. Kamil loves you!",
            "Your smile is my favorite sight in the entire world.",
            "I promise to hold your hand through every storm we face.",
            "Iffat, you are my home. Wherever you are, that is where I belong.",
            "I love you more than words could ever express, but I’ll spend forever trying.",
            "You are the peanut butter to my jelly, the Bubu to my Dudu.",
            "Life is infinitely better when we are together, Iffat.",
            "I'm so lucky to call you mine. Forever and always, no matter what.",
            "You have no idea how much my heart races the moment I see you.",
            "You are my greatest blessing, Iffat. I thank the stars for you every day.",
            "I would choose you over and over again, without a single doubt.",
            "Your love is all I need to feel complete in this big world.",
            "Iffat, you are my world, my moon, and all my stars. ✨",
            "I love the way you look at me—it makes me feel like I can do anything.",
            "You are the queen of my heart, and I am your most loyal subject.",
            "I still get butterflies every time I see your name pop up on my phone.",
            "Kamil loves Iffat, now, tomorrow, and for all of eternity.",
            "You are the most precious treasure I have ever found.",
            "Thank you for loving me exactly as I am, Iffat.",
            "Iffat, you are my favorite person to talk to, to laugh with, and to love.",
            "Everything I do, I do it with our future in mind.",
            "You're the first thing on my mind every morning when I wake up.",
            "I can't imagine a single day of my life without you by my side.",
            "You're my person, my love, and my entire life.",
            "Falling in love with you was the easiest and best thing I've ever done.",
            "You are my forever and always, Iffat. Don't ever forget that.",
            "My soul and your soul are forever tangled together.",
            "You are my happiness, my peace, and my joy, my Iffat.",
            "I want to spend every sunrise and every sunset with you.",
            "You're the only one who truly understands the real me.",
            "Iffat, you are breathtakingly beautiful, even when you don't try.",
            "My love for you is a journey starting at forever and ending at never.",
            "You make my heart skip a beat every time I hear your laugh.",
            "I love you more than I did yesterday, but less than I will tomorrow.",
            "You're my favorite dream come true. I love you, Iffat!",
            "I promise to always be your peace and your safe place. - Kamil",
            "In a world full of temporary things, you are my forever.",
            "You are my heart's eternal home, and I am never leaving."
        ];

        function createStars() {
            const starLayer = document.getElementById('star-layer');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                starLayer.appendChild(star);
            }
        }

        function speakFullMessage(note) {
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance();
            speech.text = `I love you Iffat! ${note}`;
            speech.volume = 1;
            speech.rate = 0.85;
            speech.pitch = 1.1;
            window.speechSynthesis.speak(speech);
        }

        function createPetals() {
            for (let i = 0; i < 15; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.innerHTML = Math.random() > 0.5 ? '🌸' : '💗';
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.fontSize = (Math.random() * 20 + 10) + 'px';
                petal.style.animationDuration = (Math.random() * 3 + 2) + 's';
                document.body.appendChild(petal);
                setTimeout(() => petal.remove(), 5000);
            }
        }

        async function fetchGif() {
            const bg = document.getElementById('bg-gif');
            bg.style.opacity = '0';

            if (useCatAPI) {
                try {
                    const response = await fetch('https://api.thecatapi.com/v1/images/search?mime_types=gif');
                    const data = await response.json();
                    bg.src = data[0].url;
                    bg.onload = () => bg.style.opacity = '1';
                } catch (e) { console.error("Cat API Error"); }
            } else {
                const offset = Math.floor(Math.random() * 50);
                const url = `/api/get-gif?q=${encodeURIComponent(currentQuery)}&offset=${offset}`;
                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    bg.src = data.data[0].images.original.url;
                    bg.onload = () => bg.style.opacity = '1';
                } catch (e) { console.error("Giphy Error"); }
            }
        }

        function setTab(query, emoji, btn, isCat) {
            currentQuery = query;
            useCatAPI = isCat;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('display-emoji').innerText = emoji;
            fetchGif();
        }

        function reveal() {
            const box = document.getElementById('message-box');
            const randomNote = loveNotes[Math.floor(Math.random() * loveNotes.length)];
            
            speakFullMessage(randomNote);
            createPetals();
            
            box.style.opacity = '0';
            setTimeout(() => {
                box.innerText = `"${randomNote}"`;
                box.style.opacity = '1';
                fetchGif(); 
            }, 300);
        }

        window.onload = () => {
            createStars();
            fetchGif();
        };
    </script>
</body>
</html>
